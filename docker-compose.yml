version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: attendance_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-net

  web:
    build: .
    container_name: attendance_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: postgres
      SECRET_KEY: postgres
    ports:
      - "5000:5000"
    networks:
      - app-net

volumes:
  pgdata:

networks:
  app-net:
    driver: bridge
